spring:
  application:
    name: ckg-backend

  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/ckg
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Neo4j Configuration
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: neo4j123456

  # Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 10000ms

  # Jackson Configuration
  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

  # Async Configuration
  task:
    execution:
      pool:
        core-size: 4
        max-size: 16
        queue-capacity: 100
        keep-alive: 60s
    scheduling:
      pool:
        size: 4

# JWT Configuration
jwt:
  secret: ckg-secret-key-at-least-256-bits-long-for-hs256-algorithm-security
  expiration: 86400000  # 24 hours
  header: Authorization
  prefix: "Bearer "

# LLM Configuration
# Supported providers: openai, azure, qwen, dashscope, tongyi, deepseek, ollama
llm:
  provider: openai
  model: gpt-4o
  api-key: ${LLM_API_KEY:your-api-key}
  base-url: ${LLM_BASE_URL:https://api.openai.com/v1}
  temperature: 0.7
  max-tokens: 4096

# Multi-LLM Provider Examples:
#
# OpenAI:
# llm.provider: openai
# llm.model: gpt-4o
# llm.api-key: sk-xxx
#
# Azure OpenAI:
# llm.provider: azure
# llm.model: gpt-4
# llm.base-url: https://your-resource.openai.azure.com
# llm.api-key: your-azure-key
#
# Tongyi (Qwen):
# llm.provider: qwen
# llm.model: qwen-max
# llm.api-key: sk-xxx
#
# DeepSeek:
# llm.provider: deepseek
# llm.model: deepseek-chat
# llm.api-key: sk-xxx

# Parse Configuration
parse:
  max-parallel-projects: 2
  timeout-minutes: 30
  chunk-size: 100
  max-commits: 1000
  max-file-lines: 5000
  max-file-size-mb: 10

# Git Repository Storage
git:
  repos-path: ./repos

# File Security
file:
  allowed-extensions: .java,.kt,.ts,.tsx,.js,.jsx,.vue,.py,.go,.rs
  max-file-size: 10MB

# Logging Configuration
logging:
  level:
    root: INFO
    com.example.ckg: DEBUG
    org.springframework.data.neo4j: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

server:
  port: 8080
  servlet:
    context-path: /api